title: "LSASS Memory Credential Dumping"
id: "e6094aa8-8036-42fd-9e68-92db7b4d2aea"
status: testing
description: |
  Detects attempts to read or dump the LSASS process memory to harvest plaintext credentials or NTLM hashes. Covers tooling including Mimikatz, ProcDump, Task Manager memory dumps, and direct LSASS handle access.
author: "Yazeed Dweik"
date: 2026/03/29
modified: 2026/03/29
version: 1.0.0

tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
  - credential-access
  - lsass
  - mimikatz
  - windows
  - critical-asset

logsource:
  product: windows
  category: process_creation

detection:
  selection:
    entityField: 'user_account'
    behavioralType: 'user'
    learningPeriod: '30d'
  condition: selection

falsepositives:
  - Legitimate administrative activity
  - Authorized security tooling

level: critical
severity: critical
enabled: true